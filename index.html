<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Log in - Welcome</title>
        <link rel="stylesheet" href="/style.css" />
    </head>
    <body>
        <div class="container">
            <div class="msgContainer">
                <p class="welcomeMsg">Welcome Back</p>
                <p class="loginMsg">Log in to continue</p>
            </div>
            <div class="userInput">
                <form action="/submit" class="form">
                    <input
                        type="email"
                        id="userEmail"
                        class="inputText"
                        placeholder="Email"
                        required
                    />
                    <input
                        type="password"
                        id="userPassword"
                        class="inputText"
                        placeholder="Password"
                        required
                    />
                    <div class="forgotPass">
                        <a href="#">Forgot password?</a>
                    </div>
                    <button
                        type="submit"
                        class="continueBtn formBtns"
                        id="continueBtn"
                    >
                        Continue
                    </button>
                </form>
                <a href="/register/index.html">
                    <button class="formBtns createAccBtn">
                        Create Account
                    </button>
                </a>
            </div>
        </div>
    </body>
</html>
